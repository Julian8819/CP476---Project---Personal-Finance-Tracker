<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Finance Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="mainScreen" class="screen">
    <h1>Personal Finance Tracker</h1>
    <div class="chart-container">
      <canvas id="summaryChart" width="300" height="300"></canvas>
    </div>

    <div class="button-row">
      <button onclick="showWindow('addWindow')">Add</button>
      <button onclick="showWindow('deleteWindow')">Delete</button>
      <button onclick="showWindow('editWindow')">Edit</button>
    </div>
    <button class="summary-btn" onclick="showWindow('summaryWindow')">Summary</button>
  </div>

  <div id="addWindow" class="window hidden">
    <button class="close-btn" onclick="closeWindow('addWindow')">X</button>
    <h2>Add Transaction</h2>
    <form id="addForm">
      <label>Amount</label>
      <input type="number" id="addAmount" required>
      <label>Type</label>
      <select id="addType">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <label>Category</label>
      <select id="addCategory"></select>
      <button type="submit">Add</button>
    </form>
  </div>

  <div id="deleteWindow" class="window hidden">
    <button class="close-btn" onclick="closeWindow('deleteWindow')">X</button>
    <h2>Delete Transactions</h2>
    <div id="deleteList"></div>
    <div class="pagination">
      <button onclick="prevPage('delete')">&#8592;</button>
      <span id="pageNumberDelete"></span>
      <button onclick="nextPage('delete')">&#8594;</button>
    </div>
  </div>


  <div id="editWindow" class="window hidden">
    <button class="close-btn" onclick="closeWindow('editWindow')">X</button>
    <h2>Edit Transactions</h2>
    <div id="editList"></div>
    <div class="pagination">
      <button onclick="prevPage('edit')">&#8592;</button>
      <span id="pageNumberEdit"></span>
      <button onclick="nextPage('edit')">&#8594;</button>
    </div>
  </div>

  <div id="editFormWindow" class="window hidden">
    <button class="close-btn" onclick="closeWindow('editFormWindow')">X</button>
    <h2>Edit Transaction</h2>
    <form id="editForm">
      <label>Amount</label>
      <input type="number" id="editAmount" required>
      <label>Type</label>
      <select id="editType">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <label>Category</label>
      <select id="editCategory"></select>
      <button type="submit">Edit</button>
    </form>
  </div>

  <div id="summaryWindow" class="window hidden summary">
    <button class="close-btn" onclick="closeWindow('summaryWindow')">X</button>
    <h2>Transaction Summary</h2>
    <label>Filter by date:</label>
    <input type="date" id="filterDate">
    <table id="summaryTable">
      <thead>
        <tr>
          <th>Category</th>
          <th>Date</th>
          <th>Type</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <h3 id="netBalance"></h3>
  </div>

  <script src="script.js"></script>
</body>
</html>
